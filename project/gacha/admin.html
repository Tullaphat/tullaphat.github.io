<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand">🛠 Admin Panel</span>
  <button class="btn btn-sm btn-outline-light" onclick="logout()">Logout</button>
</nav>

<div class="container py-4">

  <div class="d-flex gap-2 mb-4">
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addCreditModal">Add Credit</button>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createUserModal">Create User</button>
  </div>

  <!-- UPLOAD -->
  <div class="card">
    <div class="card-header">Upload Photo</div>
    <div class="card-body">
      <form id="uploadForm">
        <input type="file" name="photo" class="form-control mb-2" required>
        <select name="rarity" class="form-select mb-2">
          <option>R</option>
          <option>SR</option>
          <option>SSR</option>
        </select>
        <input type="number" name="stock" class="form-control mb-2" placeholder="Stock">
        <button class="btn btn-primary">Upload</button>
      </form>
    </div>
  </div>

  <div class="card mt-4">
  <div class="card-header">Photo List</div>
  <div class="card-body">
    <div id="photoList" class="row g-2"></div>
  </div>
</div>

</div>

<div class="modal fade" id="addCreditModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add Credit</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body row g-2">
        <div class="col-12">
          <select id="adminUserId" class="form-select">
            <option value="">Select user</option>
          </select>
        </div>
        <div class="col-12">
          <input id="adminAmount" type="number" class="form-control" placeholder="Amount">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-success" onclick="addCredit()">Add</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="createUserModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Create User</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body row g-2">
        <div class="col-12">
          <input id="newUsername" class="form-control" placeholder="Username" oninput="checkUsernameAvailability()">
        </div>
        <div class="col-12">
          <select id="newUserRole" class="form-select">
            <option value="user">user</option>
            <option value="admin">admin</option>
          </select>
        </div>
        <div class="col-12">
          <small id="createUserStatus" class="text-muted"></small>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button id="createUserBtn" type="button" class="btn btn-primary" onclick="createUser()" disabled>Create account</button>
      </div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
loadAdminUsers();
loadAdminPhotos();
</script>

</body>
</html>
