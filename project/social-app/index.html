<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social App | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/auth-page.css" />
  </head>
  <body class="auth-body auth-body-login">
    <main class="auth-shell">
      <section class="auth-panel auth-panel-brand" aria-label="Brand intro">
        <p class="brand-kicker">Social App</p>
        <h1>Welcome back.</h1>
        <p class="brand-copy">
          Connect with your people, follow updates, and jump straight into your feed.
        </p>
      </section>

      <section class="auth-panel auth-panel-form" aria-label="Login form">
        <div class="form-header">
          <h2>Log in</h2>
          <p>Use your account credentials to continue.</p>
        </div>

        <form id="login-form" novalidate>
          <label for="login-email">Email</label>
          <input
            id="login-email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />

          <label for="login-password">Password</label>
          <input
            id="login-password"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="Enter your password"
            required
            minlength="8"
          />

          <label class="checkbox-row" for="remember-me">
            <input id="remember-me" name="rememberMe" type="checkbox" />
            <span>Remember me</span>
          </label>

          <p class="form-message" id="login-message" role="status" aria-live="polite"></p>

          <button type="submit" class="btn-primary">Login</button>
        </form>

        <p class="switch-link">
          New here?
          <a href="register.html">Create an account</a>
        </p>
      </section>
    </main>

    <script src="assets/js/app-config.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
