<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social App | Bookmarks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="assets/css/bookmarks-page.css" />
  </head>
  <body class="bookmarks-body has-mobile-tabbar" data-left-active="bookmarks" data-mobile-active="bookmarks">
    <header id="app-topbar-root" class="app-topbar"></header>

    <main class="bookmarks-layout">
      <aside id="app-left-sidebar-root" class="app-left-sidebar"></aside>

      <section class="bookmarks-panel card-glass">
        <header class="bookmarks-panel-head">
          <h1>Bookmarked Posts</h1>
          <p id="bookmarks-summary">Loading bookmarked posts...</p>
        </header>
        <div id="bookmarks-list" class="bookmarks-list"></div>
      </section>
    </main>

    <nav id="mobile-tabbar-root" class="mobile-tabbar" aria-label="Primary"></nav>

    <script src="assets/js/app-config.js"></script>
    <script src="assets/js/common-utils.js"></script>
    <script src="assets/js/shell.js"></script>
    <script src="assets/js/navbar-shared.js"></script>
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/bookmarks.js"></script>
  </body>
</html>
